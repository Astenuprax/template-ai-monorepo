# Dependabot configuration for template-ai-monorepo.
# Author: Phillip Anderson | Integrate-IT Australia
# Conforms to repo-structure-standard, repo-hygiene, and governance-standards.
version: 2
updates:
  # GitHub Actions workflows under .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Python dependencies for the uv workspace (uv sync --all-packages).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
